services:
  api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./reporteskpi:/app/reporteskpi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portabilidad_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-portabilidad}
      POSTGRES_USER: ${DB_USER:-bot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es obligatorio}
    # Sin mapeo de puerto al host: la DB solo es accesible dentro de la red Docker.
    # Para acceso puntual de operación usar un túnel SSH, no exponer 5432.
    volumes:
      - portabilidad_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot} -d ${DB_NAME:-portabilidad}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portabilidad_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - portabilidad_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portabilidad_net
    restart: unless-stopped

  qdrant:
    # Pinear a una versión fija en prod vía QDRANT_IMAGE (reproducibilidad/supply-chain).
    # Ej: QDRANT_IMAGE=qdrant/qdrant:v1.12.4 — confirmar el tag desplegado.
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: bot_telcel_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6334}:6333"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - portabilidad_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portabilidad_net

networks:
  portabilidad_net:
    driver: bridge

volumes:
  portabilidad_postgres_data:
  portabilidad_redis_data:
  portabilidad_qdrant_data:
