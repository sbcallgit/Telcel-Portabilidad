<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <span class="logo-dot"></span>
      <span class="logo-text">Telcel Portabilidad</span>
    </div>
    <h1>Dashboard KPI</h1>
    <p class="subtitle">Ingresa con tu correo y contraseña.</p>

    <form (ngSubmit)="login()">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="usuario@callcom.mx"
          autocomplete="username"
          [disabled]="loading"
        />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••••••"
          autocomplete="current-password"
          [disabled]="loading"
        />
      </div>
      @if (error) {
        <p class="error">{{ error }}</p>
      }
      <button type="submit" [disabled]="loading || !email || !password">
        @if (loading) { Verificando... } @else { Ingresar }
      </button>
    </form>
  </div>
</div>
