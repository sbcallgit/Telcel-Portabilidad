name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install ruff mypy
      - name: Ruff check
        run: ruff check .
      - name: Mypy check
        run: mypy . --ignore-missing-imports

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portabilidad_test
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: botpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-asyncio pytest-cov freezegun
      - name: Run tests
        env:
          DB_HOST: localhost
          DB_NAME: portabilidad_test
          DB_USER: bot
          DB_PASSWORD: botpassword
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=60

  build:
    name: Build Docker
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t bot_telcel_portabilidad:ci .
